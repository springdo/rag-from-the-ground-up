apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: rag-testing-stack
  namespace: rag-testing
spec:
  replicas: 1
  server:
    containerSpec:
      env:
        # Metadata Store Configuration (Required)
        - name: POSTGRES_HOST
          # value: "postgres-service.rag-testing.svc.cluster.local"
          value: "postgres-service"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "llamastack_db"
        - name: POSTGRES_USER
          value: "llamastack"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

        # On cluster LLM configuration
        - name: INFERENCE_MODEL
          valueFrom:
            secretKeyRef:
              name: llama-stack-secret
              key: INFERENCE_MODEL
        - name: VLLM_URL
          valueFrom:
            secretKeyRef:
              name: llama-stack-secret
              key: VLLM_URL
        - name: VLLM_TLS_VERIFY
          valueFrom:
            secretKeyRef:
              name: llama-stack-secret
              key: VLLM_TLS_VERIFY
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: llama-stack-secret
              key: VLLM_API_TOKEN
        - name: VLLM_MAX_TOKENS
          valueFrom:
            secretKeyRef:
              name: llama-stack-secret
              key: VLLM_MAX_TOKENS
        
        # 2. FIX: Define the embedding provider correctly
        # In RHOAI, the stack often expects 'inline_sentence_transformers' 
        # or a specific remote ID. If you are using vLLM for embeddings:
        # - name: EMBEDDING_MODEL
        #   value: "nomic-ai/nomic-embed-text-v1.5"
        # - name: EMBEDDING_PROVIDER_ID
        #   value: "vllm-embedding" # Change 'vllm-embedding' to 'remote_vllm'

        # Vector DB Configuration (Inline Milvus)
        - name: VECTOR_DB_PROVIDER
          value: "milvus" # This triggers the inline milvus provider
        
        # Storage Configuration (MinIO)
        - name: S3_ENDPOINT_URL
          value: "http://minio-service.rag-testing.svc.cluster.local:9000"
        - name: S3_ACCESS_KEY
          value: "minioadmin"
        - name: S3_SECRET_KEY
          value: "minio-password"
        - name: S3_BUCKET
          value: "knowledge-base"
    distribution:
      name: rh-dev
    storage:
      size: 20Gi